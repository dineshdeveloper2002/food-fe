    runs-on: ubuntu-latest
    environment: staging
    env:
      PORT: 8080
      MONGO_SECRETS: ${{secrets.MONGO_CLUSTER}}
    steps:
      - name: compile data
        run: "echo test data ${{env.mongoDB}}"
