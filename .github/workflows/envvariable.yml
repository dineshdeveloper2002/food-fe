        run: "echo test $PORT"

      - name: Secret Manger env-run
        run: "echo ${env.MONGO_CLUSTER}"
  compilationdata:
    runs-on: ubuntu-latest
    environment: dev1
    steps:
      - name: dev data
        run: "echo ${env.MONGO_CLUSTER}"
